<svg viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="prism-title prism-desc">
  <title id="prism-title">Comment Heurix décompose une référence produit, comme un prisme décompose la lumière</title>
  <desc id="prism-desc">Une référence brute comme M8 x 20 - Inox A2 traverse la loupe Heurix et ressort décomposée en trois informations distinctes et exploitables : le diamètre, la longueur et la matière.</desc>

  <text x="60" y="72" font-family="'IBM Plex Mono',monospace" font-size="15" font-weight="700" fill="#5B5E76">« M8 x 20 – Inox A2 »</text>
  <text x="60" y="92" font-family="'Plus Jakarta Sans',sans-serif" font-size="12" fill="#888780">référence brute, telle que reçue</text>

  <g stroke="#5B5E76" stroke-width="1.4" stroke-linecap="round" opacity="0.55">
    <line x1="30" y1="130" x2="222" y2="178"/>
    <line x1="30" y1="155" x2="228" y2="192"/>
    <line x1="30" y1="182" x2="234" y2="204"/>
    <line x1="30" y1="210" x2="236" y2="210"/>
    <line x1="30" y1="238" x2="234" y2="216"/>
    <line x1="30" y1="265" x2="228" y2="228"/>
    <line x1="30" y1="292" x2="222" y2="242"/>
  </g>

  <g>
    <circle cx="300" cy="210" r="54" fill="#EEF1FF" stroke="#3F52E8" stroke-width="3"/>
    <line x1="339" y1="249" x2="378" y2="288" stroke="#3F52E8" stroke-width="11" stroke-linecap="round"/>
  </g>

  <path d="M348 178 L470 100" fill="none" stroke="#3F52E8" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
  <path d="M352 210 L470 210" fill="none" stroke="#1D9E75" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
  <path d="M348 242 L470 320" fill="none" stroke="#BA7517" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>

  <g>
    <circle cx="500" cy="100" r="26" fill="#E6F1FB" stroke="#3F52E8" stroke-width="1.5"/>
    <circle cx="500" cy="100" r="12" fill="none" stroke="#0C447C" stroke-width="2"/>
    <line x1="491" y1="109" x2="509" y2="91" stroke="#0C447C" stroke-width="2" stroke-linecap="round"/>
  </g>
  <text x="536" y="94" font-family="'Plus Jakarta Sans',sans-serif" font-size="15" font-weight="700" fill="#0C447C">M8</text>
  <text x="536" y="112" font-family="'Plus Jakarta Sans',sans-serif" font-size="12" fill="#5B5E76">Diamètre</text>

  <g>
    <circle cx="500" cy="210" r="26" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1.5"/>
    <line x1="489" y1="210" x2="511" y2="210" stroke="#085041" stroke-width="2" stroke-linecap="round"/>
    <line x1="489" y1="204" x2="489" y2="216" stroke="#085041" stroke-width="2" stroke-linecap="round"/>
    <line x1="511" y1="204" x2="511" y2="216" stroke="#085041" stroke-width="2" stroke-linecap="round"/>
  </g>
  <text x="536" y="204" font-family="'Plus Jakarta Sans',sans-serif" font-size="15" font-weight="700" fill="#085041">20 mm</text>
  <text x="536" y="222" font-family="'Plus Jakarta Sans',sans-serif" font-size="12" fill="#5B5E76">Longueur</text>

  <g>
    <circle cx="500" cy="320" r="26" fill="#FAEEDA" stroke="#BA7517" stroke-width="1.5"/>
    <rect x="490" y="310" width="20" height="20" rx="4" fill="none" stroke="#633806" stroke-width="2"/>
    <line x1="490" y1="317" x2="510" y2="317" stroke="#633806" stroke-width="1.3"/>
    <line x1="490" y1="324" x2="510" y2="324" stroke="#633806" stroke-width="1.3"/>
  </g>
  <text x="536" y="314" font-family="'Plus Jakarta Sans',sans-serif" font-size="15" font-weight="700" fill="#633806">Inox A2</text>
  <text x="536" y="332" font-family="'Plus Jakarta Sans',sans-serif" font-size="12" fill="#5B5E76">Matière</text>

  <text x="300" y="386" text-anchor="middle" font-family="'Plus Jakarta Sans',sans-serif" font-size="13" font-weight="700" fill="#12142B">3 informations reconnues automatiquement</text>
  <text x="300" y="404" text-anchor="middle" font-family="'Plus Jakarta Sans',sans-serif" font-size="12" fill="#5B5E76">retrouvable même écrit « m8x20 inox » ou « M 8 X 20 INOX A2 »</text>
</svg>
