<svg viewBox="0 0 620 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="setup-pyramid-title setup-pyramid-desc">
  <title id="setup-pyramid-title">Le parcours de mise en route Heurix, en pyramide</title>
  <desc id="setup-pyramid-desc">Une pyramide en quatre niveaux : à la base, les fondations obligatoires (souscription, clé API, premier catalogue indexé) ; au-dessus, trois modules optionnels empilés — Heurix Tracker, intégration front-end, serveur MCP.</desc>

  <!-- Face laterale (biseau) pour l'effet 3D, calculee comme un decalage
       constant du bord droit de la pyramide -->
  <polygon points="280,50 480,380 498,390 298,60" fill="#C7CBE8" opacity="0.65"/>

  <!-- Bande 1 (bas, la plus large) : Fondations -->
  <polygon points="130,297.5 430,297.5 480,380 80,380" fill="#EEF0F6" stroke="#5B5E76" stroke-width="1.5"/>
  <text x="280" y="330" text-anchor="middle" font-family="'Plus Jakarta Sans',sans-serif" font-size="15" font-weight="700" fill="#12142B">1. Fondations</text>
  <text x="280" y="349" text-anchor="middle" font-family="'Plus Jakarta Sans',sans-serif" font-size="11.5" fill="#5B5E76">Souscription · clé API · premier catalogue</text>
  <text x="280" y="365" text-anchor="middle" font-family="'Plus Jakarta Sans',sans-serif" font-size="11" font-weight="700" fill="#5B5E76">obligatoire</text>

  <!-- Bande 2 : Heurix Tracker (vert) -->
  <polygon points="180,215 380,215 430,297.5 130,297.5" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1.5"/>
  <text x="280" y="248" text-anchor="middle" font-family="'Plus Jakarta Sans',sans-serif" font-size="14.5" font-weight="700" fill="#085041">2. Heurix Tracker</text>
  <text x="280" y="265" text-anchor="middle" font-family="'Plus Jakarta Sans',sans-serif" font-size="11" fill="#5B5E76">Conversion &amp; ROI</text>
  <text x="280" y="280" text-anchor="middle" font-family="'Plus Jakarta Sans',sans-serif" font-size="10.5" font-weight="700" fill="#1D9E75">optionnel</text>

  <!-- Bande 3 : Integration front (bleu) -->
  <polygon points="230,132.5 330,132.5 380,215 180,215" fill="#EEF1FF" stroke="#3F52E8" stroke-width="1.5"/>
  <text x="280" y="167" text-anchor="middle" font-family="'Plus Jakarta Sans',sans-serif" font-size="13.5" font-weight="700" fill="#0C447C">3. Intégration front</text>
  <text x="280" y="183" text-anchor="middle" font-family="'Plus Jakarta Sans',sans-serif" font-size="10.5" font-weight="700" fill="#3F52E8">optionnel</text>

  <!-- Bande 4 (haut, la plus etroite) : MCP (ambre) -->
  <polygon points="280,50 330,132.5 230,132.5" fill="#FAEEDA" stroke="#BA7517" stroke-width="1.5"/>
  <text x="280" y="103" text-anchor="middle" font-family="'Plus Jakarta Sans',sans-serif" font-size="12.5" font-weight="700" fill="#633806">4. MCP</text>
  <text x="280" y="118" text-anchor="middle" font-family="'Plus Jakarta Sans',sans-serif" font-size="9.5" font-weight="700" fill="#BA7517">option.</text>

  <text x="280" y="404" text-anchor="middle" font-family="'Plus Jakarta Sans',sans-serif" font-size="12.5" fill="#5B5E76">Une seule base obligatoire, trois extensions indépendantes au choix</text>
</svg>
